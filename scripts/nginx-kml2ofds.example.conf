# Example: reverse-proxy the entire site to uvicorn so /favicon.ico and /static/
# are served by FastAPI (web.app mounts StaticFiles and defines GET /favicon.ico).
#
# Common mistake: a `location /static/ { alias ... }` block that points at an empty or
# wrong directory — nginx returns 404 and never hits the app.
#
# Adjust server_name, root, SSL paths, and upstream port as needed.

upstream kml2ofds_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name kml2ofds.opentelecomdata.org;

    # ssl_certificate ...;
    # ssl_certificate_key ...;

    location / {
        proxy_pass http://kml2ofds_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # POST /convert streams SSE for a long time (large KML consolidation).
        # Default proxy_read_timeout (often 60s) closes the stream early.
        proxy_read_timeout 7200s;
        proxy_send_timeout 7200s;
    }
}
